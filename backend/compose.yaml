services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sankat_mochan
      POSTGRES_USER: sankat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./setup-postgres.sh first}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - sankat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sankat -d sankat_mochan"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  sankat_postgres_data:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🆘</text></svg>" />
    <title>Sankat-Mochan · Mesh Flow Simulator</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Browsers freeze requestAnimationFrame in occluded/background windows, which
      // stalls MapLibre's style load and the sim clock. Fall back to setTimeout while
      // hidden so automated captures and half-covered demo screens keep animating.
      ;(() => {
        const raf = window.requestAnimationFrame.bind(window)
        const caf = window.cancelAnimationFrame.bind(window)
        const timers = new Map()
        let seq = 1
        window.requestAnimationFrame = (cb) => {
          if (document.visibilityState !== 'hidden') return raf(cb)
          const id = -(seq++)
          timers.set(id, setTimeout(() => { timers.delete(id); cb(performance.now()) }, 16))
          return id
        }
        window.cancelAnimationFrame = (id) => {
          if (id < 0) { clearTimeout(timers.get(id)); timers.delete(id) } else caf(id)
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
